<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
        <title>CommonGood | Your Events</title>
        <link rel="stylesheet" href="../css/style.css?v=8">
    </head>

    <!-- your-events.html: shows the host's upcoming and past events with a modal to create new ones. -->
    <body class="hosting-dashboard-page">
        <div class="hosting-dashboard-layout">
            <!-- Left sidebar: hosting section navigation links. -->
            <aside class="hosting-dashboard-sidebar" aria-label="Hosting navigation">
                <h2 class="hosting-dashboard-brand">HOSTING:</h2>
                <nav class="hosting-dashboard-nav">
                    <a class="hosting-dashboard-nav-item" href="host-dashboard.html">Dashboard</a>
                    <a class="hosting-dashboard-nav-item" href="add.html?mode=edit">Your Locations</a>
                    <a class="hosting-dashboard-nav-item" href="reservation-calendar.html">Reservation Calendar</a>
                    <a class="hosting-dashboard-nav-item is-active" href="your-events.html" aria-current="page">Your Events</a>
                </nav>
            </aside>

            <main class="hosting-dashboard-main">
                <!-- Page header with title and a button to open the create event modal. -->
                <header class="hosting-dashboard-header">
                    <h1>Manage Your Events</h1>
                    <button class="hosting-dashboard-btn" id="open-create-event-modal" type="button">Create an Event</button>
                </header>

                <!-- Tab row for switching between upcoming and past event views. -->
                <section class="events-tabs" aria-label="Event views">
                    <button class="events-tab events-tab-active" type="button">Upcoming</button>
                    <button class="events-tab" type="button">Past Events</button>
                </section>

                <!-- Event cards are rendered here by your-events.js. -->
                <section class="events-list" id="events-list" aria-label="Upcoming events list">
                    <p class="hosting-panel-empty">No events yet. Create one to see it in the reservation calendar.</p>
                </section>

                <footer class="events-footer">
                    <p id="events-count-label">Showing 0 upcoming events</p>
                </footer>
            </main>
        </div>

        <!-- Create event modal: title, date, start/end time, location notes, and save button. -->
        <div class="hosting-modal-backdrop" id="create-event-modal-backdrop" hidden>
            <div class="hosting-modal" role="dialog" aria-modal="true" aria-labelledby="create-event-modal-title">
                <button class="hosting-modal-close" id="close-create-event-modal" type="button" aria-label="Close modal">x</button>
                <h2 id="create-event-modal-title">Create an Event</h2>

                <label for="event-title-input">Event Title</label>
                <input id="event-title-input" type="text" placeholder="Print Finishing Class">

                <label for="event-date-input">Date</label>
                <input id="event-date-input" type="date">

                <label for="event-start-input">Start Time</label>
                <input id="event-start-input" type="time" step="3600" value="10:00">

                <label for="event-end-input">End Time</label>
                <input id="event-end-input" type="time" step="3600" value="12:00">

                <label for="event-location-notes-input">Location Notes</label>
                <input id="event-location-notes-input" type="text" placeholder="Workshop Room A">

                <button class="hosting-dashboard-btn" id="save-event-btn" type="button">Save Event</button>
            </div>
        </div>

        <script type="text/javascript" src="../js/your-events.js?v=3"></script>
    </body>
</html>
