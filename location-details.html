<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
        <title>CommonGood | Location Details</title>
        <link rel="stylesheet" href="css/style.css?v=9">
    </head>

    <body class="details-page">
        <div class="details-shell">
            <header class="details-header">
                <a class="details-brand" href="index.html">CommonGood</a>
                <a class="details-back-link" href="index.html">Back to map</a>
            </header>

            <main class="details-main">
                <section class="details-banner" id="details-banner" aria-label="Location banner"></section>

                <section class="details-top-row">
                    <img id="details-host-photo" class="details-host-photo" src="img/avatar-placeholder.svg" alt="Host profile">
                    <div class="details-top-meta">
                        <h1 id="details-location-name">Location</h1>
                        <p id="details-location-address">Address not listed</p>
                    </div>
                    <a id="details-book-link" class="details-book-btn" href="#">Book Now</a>
                </section>

                <section class="details-grid">
                    <article class="details-card">
                        <h2>About the Host</h2>
                        <p id="details-host-name" class="details-host-name">Community Host</p>
                        <p id="details-description">Location details coming soon.</p>
                        <p id="details-contact" class="details-subtle"></p>
                        <p id="details-hours" class="details-subtle"></p>
                    </article>

                    <article class="details-card">
                        <h2>Available Services</h2>
                        <ul id="details-services-list" class="details-service-list"></ul>
                    </article>
                </section>

                <section class="details-card details-extra-card">
                    <h2>Links</h2>
                    <div id="details-links-wrap"></div>
                </section>
            </main>
        </div>

        <script type="text/javascript" src="js/location-details.js?v=1"></script>
    </body>
</html>
